name: Terraform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write    # For OIDC auth with Azure
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false   # Never cancel infra changes mid-flight

env:
  TF_VERSION: "1.7.5"
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_OIDC: true

jobs:
  # ──────────────────────────────────────────────
  # Lint & validate
  # ──────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init (dev)
        working-directory: envs/dev
        run: terraform init -backend=false

      - name: Terraform validate (dev)
        working-directory: envs/dev
        run: terraform validate

  # ──────────────────────────────────────────────
  # Security scan with tfsec
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: .
          soft_fail: true

  # ──────────────────────────────────────────────
  # Plan (dev)
  # ──────────────────────────────────────────────
  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: envs/dev
        run: terraform init

      - name: Terraform plan
        working-directory: envs/dev
        run: |
          terraform plan \
            -var="postgres_admin_username=${{ secrets.POSTGRES_ADMIN_USERNAME }}" \
            -var="postgres_admin_password=${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            -out=tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: envs/dev/tfplan
          retention-days: 5

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: borchero/terraform-plan-comment@v2
        continue-on-error: true
        with:
          token: ${{ github.token }}
          planfile: envs/dev/tfplan
          working-directory: envs/dev

  # ──────────────────────────────────────────────
  # Apply (dev) — only on push to main
  # ──────────────────────────────────────────────
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: [plan-dev, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: envs/dev

      - name: Terraform init
        working-directory: envs/dev
        run: terraform init

      - name: Terraform apply
        working-directory: envs/dev
        run: terraform apply -auto-approve tfplan
