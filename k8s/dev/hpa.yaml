apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ms-account-service
  namespace: account-service
  labels:
    app.kubernetes.io/name: ms-account-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-account-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
